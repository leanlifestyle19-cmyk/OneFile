<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Order Manager</title>
<style>
  :root{--ink:#16252b;--soft:#4a5d63;--paper:#f7f5f0;--card:#fff;--line:#e4e0d6;
    --accent:#d97a34;--accent-ink:#a85a1f;--ok:#2f7d5b;--no:#b53b2e;--blue:#2f6d8c;
    --mono:ui-monospace,Menlo,Consolas,monospace;--sans:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;}
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:var(--sans);background:var(--paper);color:var(--ink);line-height:1.45;padding:18px 16px;max-width:620px;margin:0 auto;-webkit-font-smoothing:antialiased}
  h1{font-size:21px;letter-spacing:-.02em}
  .sub{color:var(--soft);font-size:13px;margin-bottom:18px}
  .cards{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:18px}
  .c{background:var(--card);border:1px solid var(--line);border-radius:12px;padding:12px;text-align:center}
  .c .v{font-family:var(--mono);font-size:20px;font-weight:700}
  .c .k{font-size:10px;font-weight:700;letter-spacing:.05em;text-transform:uppercase;color:var(--soft)}
  .c.unpaid .v{color:var(--no)}
  .add{background:var(--card);border:1px solid var(--line);border-radius:12px;padding:14px;margin-bottom:18px}
  .add .r{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:8px}
  label{font-size:11px;font-weight:600;color:var(--soft);display:block;margin-bottom:3px}
  input,select{font:inherit;width:100%;padding:10px 11px;border:1px solid var(--line);border-radius:8px;background:var(--card)}
  input.num{font-family:var(--mono);text-align:right}
  input:focus,select:focus{outline:2px solid var(--accent);border-color:var(--accent)}
  .full{grid-column:1/3}
  .addbtn{width:100%;font:inherit;font-weight:600;padding:11px;border:none;border-radius:8px;background:var(--accent);color:#fff;cursor:pointer}
  .ord{background:var(--card);border:1px solid var(--line);border-radius:12px;padding:14px;margin-bottom:10px}
  .ord.collected{opacity:.55}
  .otop{display:flex;justify-content:space-between;gap:10px}
  .otop b{font-size:16px}
  .otop .when{font-size:12px;color:var(--blue);font-weight:600;white-space:nowrap}
  .items{font-size:14px;margin:6px 0 4px}
  .meta{font-size:12px;color:var(--soft)}
  .tags{display:flex;gap:6px;margin-top:8px;flex-wrap:wrap}
  .tag{font-size:11px;font-weight:700;padding:3px 9px;border-radius:20px}
  .tag.paid{background:#e3f1ea;color:var(--ok)}.tag.unpaid{background:#fbe6e3;color:var(--no)}
  .stage{display:flex;gap:6px;margin-top:10px;flex-wrap:wrap}
  .stage button{font:inherit;font-size:12px;font-weight:600;border:1px solid var(--line);background:var(--paper);border-radius:8px;padding:6px 10px;cursor:pointer;color:var(--soft)}
  .stage button.on{background:var(--ink);color:#fff;border-color:var(--ink)}
  .stage .togpay{margin-left:auto}
  .stage .togpay.ispaid{background:var(--ok);color:#fff;border-color:var(--ok)}
  .stage .x{border:none;background:none;color:var(--soft);font-size:15px}
  .empty{padding:26px;text-align:center;color:var(--soft);font-style:italic;background:var(--card);border:1px solid var(--line);border-radius:12px}
</style>
</head>
<body>
  <h1 id="title">Order Book</h1>
  <div class="sub">Every order in one place instead of buried in WhatsApp · sorted by collection time · saved on this device</div>

  <div class="cards">
    <div class="c"><div class="v" id="vOpen">0</div><div class="k">Open</div></div>
    <div class="c unpaid"><div class="v" id="vUnpaid">0</div><div class="k">Unpaid</div></div>
    <div class="c"><div class="v" id="vRev">$0</div><div class="k">Open value</div></div>
  </div>

  <div class="add">
    <div class="r">
      <div><label>Customer</label><input id="cust" placeholder="Name / @handle"></div>
      <div><label>Amount</label><input id="amt" class="num" type="number" min="0" step="0.01" placeholder="0.00"></div>
    </div>
    <div class="full" style="margin-bottom:8px"><label>Order</label><input id="items" placeholder="2x pandan chiffon, 1x kueh lapis"></div>
    <div class="r">
      <div><label>Collect / deliver</label><input id="when" type="datetime-local"></div>
      <div><label>Type</label><select id="kind"><option>Self-collect</option><option>Delivery</option></select></div>
    </div>
    <button class="addbtn" onclick="add()">+ Add order</button>
  </div>

  <div id="list"></div>

<script>
  const $=id=>document.getElementById(id);
  let orders=[];try{orders=JSON.parse(localStorage.getItem('ord')||'[]')}catch(e){orders=[]}
  const sym='$';
  const fmt=n=>sym+(n||0).toLocaleString(undefined,{minimumFractionDigits:2,maximumFractionDigits:2});
  const STAGES=['New','Preparing','Ready','Collected'];
  function save(){localStorage.setItem('ord',JSON.stringify(orders))}
  function add(){
    const c=$('cust').value.trim();if(!c){$('cust').focus();return;}
    orders.push({c,items:$('items').value.trim(),a:parseFloat($('amt').value)||0,
      when:$('when').value||'',kind:$('kind').value,stage:'New',paid:false});
    orders.sort((a,b)=>(a.when||'~').localeCompare(b.when||'~'));
    $('cust').value='';$('items').value='';$('amt').value='';$('when').value='';
    save();render();
  }
  function setStage(i,s){orders[i].stage=s;save();render();}
  function togPay(i){orders[i].paid=!orders[i].paid;save();render();}
  function rm(i){orders.splice(i,1);save();render();}
  function fmtWhen(w){if(!w)return'no time set';return new Date(w).toLocaleString('en-GB',{weekday:'short',day:'2-digit',month:'short',hour:'2-digit',minute:'2-digit'});}
  function render(){
    let open=0,unpaid=0,rev=0;
    orders.forEach(o=>{if(o.stage!=='Collected'){open++;rev+=o.a;if(!o.paid)unpaid++;}});
    $('vOpen').textContent=open;$('vUnpaid').textContent=unpaid;$('vRev').textContent=fmt(rev);
    const l=$('list');
    if(!orders.length){l.innerHTML='<div class="empty">No orders yet. Add your first one above.</div>';return;}
    l.innerHTML='';
    orders.forEach((o,i)=>{
      const div=document.createElement('div');
      div.className='ord'+(o.stage==='Collected'?' collected':'');
      div.innerHTML=`
        <div class="otop"><b>${esc(o.c)}</b><span class="when">${fmtWhen(o.when)}</span></div>
        <div class="items">${esc(o.items)||'<span style="color:#9aa">No items listed</span>'}</div>
        <div class="meta">${o.kind} · ${fmt(o.a)}</div>
        <div class="tags"><span class="tag ${o.paid?'paid':'unpaid'}">${o.paid?'Paid':'Unpaid'}</span></div>
        <div class="stage">
          ${STAGES.map(s=>`<button class="${o.stage===s?'on':''}" onclick="setStage(${i},'${s}')">${s}</button>`).join('')}
          <button class="togpay ${o.paid?'ispaid':''}" onclick="togPay(${i})">${o.paid?'$ Paid':'Mark paid'}</button>
          <button class="x" onclick="rm(${i})">×</button>
        </div>`;
      l.appendChild(div);
    });
  }
  function esc(t){return(t||'').replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]))}
  render();
</script>
</body>
</html>
