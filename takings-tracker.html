<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Takings Tracker</title>
<style>
  :root{--ink:#16252b;--soft:#4a5d63;--paper:#f7f5f0;--card:#fff;--line:#e4e0d6;
    --accent:#d97a34;--accent-ink:#a85a1f;--ok:#2f7d5b;--no:#b53b2e;
    --mono:ui-monospace,Menlo,Consolas,monospace;--sans:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;}
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:var(--sans);background:var(--paper);color:var(--ink);line-height:1.45;padding:18px 16px;max-width:560px;margin:0 auto;-webkit-font-smoothing:antialiased}
  h1{font-size:21px;letter-spacing:-.02em}
  .sub{color:var(--soft);font-size:13px;margin-bottom:18px}
  .cards{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:18px}
  .c{background:var(--card);border:1px solid var(--line);border-radius:12px;padding:14px}
  .c .k{font-size:11px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:var(--soft)}
  .c .v{font-family:var(--mono);font-size:19px;font-weight:700;margin-top:4px}
  .c.in .v{color:var(--ok)}.c.out .v{color:var(--no)}
  .entry{background:var(--card);border:1px solid var(--line);border-radius:12px;padding:14px;margin-bottom:16px}
  .seg{display:flex;gap:8px;margin-bottom:10px}
  .seg button{flex:1;font:inherit;font-weight:600;padding:9px;border:1px solid var(--line);border-radius:8px;background:var(--paper);cursor:pointer;color:var(--soft)}
  .seg button.act.sale{background:var(--ok);color:#fff;border-color:var(--ok)}
  .seg button.act.exp{background:var(--no);color:#fff;border-color:var(--no)}
  .erow{display:grid;grid-template-columns:1fr 110px;gap:8px}
  input{font:inherit;width:100%;padding:10px 11px;border:1px solid var(--line);border-radius:8px;background:var(--card)}
  input.num{font-family:var(--mono);text-align:right}
  input:focus{outline:2px solid var(--accent);border-color:var(--accent)}
  .addbtn{width:100%;margin-top:10px;font:inherit;font-weight:600;padding:11px;border:none;border-radius:8px;background:var(--accent);color:#fff;cursor:pointer}
  .list{background:var(--card);border:1px solid var(--line);border-radius:12px;overflow:hidden}
  .li{display:flex;justify-content:space-between;align-items:center;padding:12px 14px;border-bottom:1px solid var(--line);gap:10px}
  .li:last-child{border-bottom:none}
  .li .d{font-size:12px;color:var(--soft)}
  .li .a{font-family:var(--mono);font-weight:700}
  .li .a.in{color:var(--ok)}.li .a.out{color:var(--no)}
  .li .x{background:none;border:none;color:var(--soft);cursor:pointer;font-size:16px}
  .empty{padding:26px;text-align:center;color:var(--soft);font-style:italic}
  .tools{display:flex;justify-content:space-between;margin:14px 0}
  .tools button{font:inherit;font-size:13px;font-weight:600;background:var(--card);border:1px solid var(--line);border-radius:8px;padding:8px 12px;cursor:pointer;color:var(--soft)}
</style>
</head>
<body>
  <h1 id="title">Daily Takings</h1>
  <div class="sub">Log sales and expenses · totals update live · saved on this device</div>
  <div class="cards">
    <div class="c in"><div class="k">Sales</div><div class="v" id="tIn">$0</div></div>
    <div class="c out"><div class="k">Expenses</div><div class="v" id="tOut">$0</div></div>
    <div class="c"><div class="k">Net</div><div class="v" id="tNet">$0</div></div>
  </div>
  <div class="entry">
    <div class="seg">
      <button id="bSale" class="act sale" onclick="setType('sale')">Sale +</button>
      <button id="bExp" onclick="setType('exp')">Expense −</button>
    </div>
    <div class="erow">
      <input id="note" placeholder="e.g. Lunch crowd / Stock buy">
      <input id="amt" class="num" type="number" min="0" step="0.01" placeholder="0.00">
    </div>
    <button class="addbtn" onclick="add()">Add entry</button>
  </div>
  <div class="tools">
    <button onclick="exportCSV()">Export CSV</button>
    <button onclick="clearAll()">Clear all</button>
  </div>
  <div class="list" id="list"></div>
<script>
  const $=id=>document.getElementById(id);
  let type='sale';let rows=[];
  try{rows=JSON.parse(localStorage.getItem('tk')||'[]')}catch(e){rows=[]}
  const sym='$';
  const fmt=n=>sym+n.toLocaleString(undefined,{minimumFractionDigits:2,maximumFractionDigits:2});
  function setType(t){type=t;
    $('bSale').className=t==='sale'?'act sale':'';$('bExp').className=t==='exp'?'act exp':'';}
  function save(){localStorage.setItem('tk',JSON.stringify(rows))}
  function add(){
    const amt=parseFloat($('amt').value);if(!amt||amt<=0)return;
    rows.unshift({t:type,n:$('note').value.trim(),a:amt,when:new Date().toLocaleString('en-GB',{day:'2-digit',month:'short',hour:'2-digit',minute:'2-digit'})});
    $('note').value='';$('amt').value='';save();render();
  }
  function del(i){rows.splice(i,1);save();render();}
  function render(){
    let inc=0,exp=0;
    rows.forEach(r=>r.t==='sale'?inc+=r.a:exp+=r.a);
    $('tIn').textContent=fmt(inc);$('tOut').textContent=fmt(exp);$('tNet').textContent=fmt(inc-exp);
    const l=$('list');
    if(!rows.length){l.innerHTML='<div class="empty">No entries yet today.</div>';return;}
    l.innerHTML='';
    rows.forEach((r,i)=>{
      const d=document.createElement('div');d.className='li';
      d.innerHTML=`<div><div>${esc(r.n)||(r.t==='sale'?'Sale':'Expense')}</div><div class="d">${r.when}</div></div>
        <div style="display:flex;align-items:center;gap:10px"><span class="a ${r.t==='sale'?'in':'out'}">${r.t==='sale'?'+':'−'}${fmt(r.a)}</span>
        <button class="x" onclick="del(${i})">×</button></div>`;
      l.appendChild(d);
    });
  }
  function esc(s){return(s||'').replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]))}
  function exportCSV(){
    let csv='When,Type,Note,Amount\n';
    rows.forEach(r=>csv+=`"${r.when}",${r.t},"${(r.n||'').replace(/"/g,'""')}",${r.a}\n`);
    const a=document.createElement('a');a.href=URL.createObjectURL(new Blob([csv],{type:'text/csv'}));
    a.download='takings.csv';a.click();
  }
  function clearAll(){if(confirm('Clear all entries?')){rows=[];save();render();}}
  render();
</script>
</body>
</html>
