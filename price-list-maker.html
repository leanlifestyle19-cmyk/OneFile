<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Price List Maker</title>
<style>
  :root{--ink:#16252b;--soft:#4a5d63;--paper:#f7f5f0;--card:#fff;--line:#e4e0d6;
    --accent:#d97a34;--accent-ink:#a85a1f;--mono:ui-monospace,Menlo,Consolas,monospace;
    --sans:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;}
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:var(--sans);background:var(--paper);color:var(--ink);line-height:1.45;-webkit-font-smoothing:antialiased}
  .bar{display:flex;justify-content:space-between;align-items:center;padding:13px 18px;background:var(--card);border-bottom:1px solid var(--line)}
  .bar b{letter-spacing:-.02em}
  .bar button{font:inherit;font-weight:600;border:none;border-radius:8px;padding:9px 16px;background:var(--accent);color:#fff;cursor:pointer}
  .wrap{display:grid;grid-template-columns:minmax(300px,380px) 1fr}
  @media(max-width:760px){.wrap{grid-template-columns:1fr}}
  .panel{padding:18px;border-right:1px solid var(--line)}
  @media(max-width:760px){.panel{border-right:none;border-bottom:1px solid var(--line)}}
  label{display:block;font-size:12px;font-weight:600;color:var(--soft);margin:0 0 4px}
  input{font:inherit;width:100%;padding:9px 11px;border:1px solid var(--line);border-radius:8px;background:var(--card)}
  input:focus{outline:2px solid var(--accent);border-color:var(--accent)}
  .field{margin-bottom:12px}
  .lab{font-size:11px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--soft);margin:22px 0 10px;border-bottom:1px solid var(--line);padding-bottom:6px}
  .row{display:grid;grid-template-columns:1fr 86px 28px;gap:8px;margin-bottom:8px}
  .row input.num{font-family:var(--mono);text-align:right}
  .del{border:1px solid var(--line);background:var(--card);border-radius:8px;cursor:pointer;color:var(--soft);font-size:18px}
  .add{width:100%;padding:9px;border:1px dashed var(--line);border-radius:8px;background:transparent;color:var(--accent-ink);font:inherit;font-weight:600;cursor:pointer}
  .stage{display:flex;justify-content:center;padding:28px}
  @media(max-width:760px){.stage{padding:14px}}
  .doc{width:100%;max-width:560px;background:var(--card);border:1px solid var(--line);border-radius:14px;box-shadow:0 18px 40px -28px rgba(22,37,43,.5);padding:40px}
  @media(max-width:760px){.doc{padding:26px 20px}}
  .doc h1{font-size:26px;letter-spacing:-.02em;text-align:center}
  .doc .tag{text-align:center;color:var(--soft);font-size:13px;margin-top:4px;margin-bottom:24px}
  .pl{display:flex;justify-content:space-between;align-items:baseline;padding:13px 0;border-bottom:1px solid var(--line);gap:16px}
  .pl .nm{font-weight:600}
  .pl .nt{font-size:12px;color:var(--soft);font-weight:400}
  .pl .pr{font-family:var(--mono);font-weight:700;color:var(--accent-ink);white-space:nowrap}
  .doc .note{margin-top:24px;font-size:12px;color:var(--soft);text-align:center}
  @media print{@page{margin:14mm}.bar,.panel,.del,.add{display:none!important}.wrap{display:block}.stage{padding:0}.doc{border:none;box-shadow:none;border-radius:0;max-width:none;padding:0}}
  html,body{overflow-x:hidden}
</style>
</head>
<body>
  <div class="bar"><b>Price List Maker</b><button onclick="window.print()">Save as PDF</button></div>
  <div class="wrap">
    <section class="panel">
      <div class="lab">Heading</div>
      <div class="field"><label>Business name</label><input id="title" placeholder="Sunshine Tuition" oninput="r()"></div>
      <div class="field"><label>Tagline / contact</label><input id="sub" placeholder="P1–P6 English & Math · 9123 4567" oninput="r()"></div>
      <div class="lab">Items</div>
      <div class="row"><label>Service / item</label><label style="text-align:right">Price</label><span></span></div>
      <div id="items"></div>
      <button class="add" onclick="addRow()">+ Add item</button>
      <div class="lab">Footer note</div>
      <div class="field"><input id="note" placeholder="Prices valid till Dec 2026" oninput="r()"></div>
      <div class="lab">Currency symbol</div>
      <div class="field"><input id="sym" value="$" oninput="r()" style="width:70px"></div>
    </section>
    <section class="stage">
      <div class="doc" id="doc">
        <h1 id="oTitle">Your Business</h1>
        <div class="tag" id="oSub"></div>
        <div id="oList"></div>
        <div class="note" id="oNote"></div>
      </div>
    </section>
  </div>
<script>
  const $=id=>document.getElementById(id);
  let items=[];
  function addRow(nm='',pr='',nt=''){
    const i=items.length;const d=document.createElement('div');d.className='row';
    d.innerHTML=`<input placeholder="Service name" value="${nm}" oninput="u(${i},'nm',this.value)">
      <input class="num" placeholder="0.00" value="${pr}" oninput="u(${i},'pr',this.value)">
      <button class="del" onclick="del(${i})">×</button>`;
    $('items').appendChild(d);items.push({nm,pr,nt,el:d});r();
  }
  function u(i,k,v){if(items[i]){items[i][k]=v;r();}}
  function del(i){if(items[i]){items[i].el.remove();items[i]=null;r();}}
  function r(){
    $('oTitle').textContent=$('title').value||'Your Business';
    $('oSub').textContent=$('sub').value||'';
    $('oNote').textContent=$('note').value||'';
    const sym=$('sym').value||'$';const list=$('oList');list.innerHTML='';
    items.filter(Boolean).forEach(it=>{
      if(!it.nm&&!it.pr)return;
      const row=document.createElement('div');row.className='pl';
      row.innerHTML=`<span class="nm">${esc(it.nm)||'—'}</span><span class="pr">${it.pr?sym+it.pr:''}</span>`;
      list.appendChild(row);
    });
  }
  function esc(s){return(s||'').replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]))}
  addRow();addRow();r();
</script>
</body>
</html>
